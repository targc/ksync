name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/ksync-api
  IMAGE_SYNCER: ghcr.io/${{ github.repository_owner }}/ksync-syncer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - run: go mod tidy && git diff --exit-code go.mod go.sum

      - run: go build ./...

      - run: go vet ./...

  docker:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-api
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/metadata-action@v5
        id: meta-syncer
        with:
          images: ${{ env.IMAGE_SYNCER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.syncer
          push: true
          tags: ${{ steps.meta-syncer.outputs.tags }}
